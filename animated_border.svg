<svg width="800" height="8" viewBox="0 0 800 8" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0">
        <animate attributeName="offset" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" style="stop-color:#ff3333;stop-opacity:1">
        <animate attributeName="offset" values="0.4;1.4;0.4" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0">
        <animate attributeName="offset" values="1;2;1" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="800" height="8" rx="4" fill="url(#borderGrad)"/>
</svg>
