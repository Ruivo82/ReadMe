<svg width="800" height="50" viewBox="0 0 800 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .secret {
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px;
        fill: #3d8bff;
        animation: secretGlow 2s ease-in-out infinite alternate;
      }
      @keyframes secretGlow {
        from { filter: drop-shadow(0 0 3px #3d8bff); opacity: 0.7; }
        to   { filter: drop-shadow(0 0 10px #66aaff) drop-shadow(0 0 20px #0066ff); opacity: 1; }
      }
    </style>
  </defs>
  <rect width="800" height="50" fill="#0d1117" rx="6"/>
  <text x="400" y="30" text-anchor="middle" class="secret">🔒 Something is coming... Click to reveal</text>
</svg>
